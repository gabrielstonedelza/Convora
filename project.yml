name: Convora
options:
  bundleIdPrefix: com.convora
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"

targets:
  Convora:
    type: application
    platform: iOS
    sources:
      - Convora
    info:
      path: Convora/Info.plist
      properties:
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UILaunchScreen: {}
        UIApplicationSupportsIndirectInputEvents: true
        NSUserNotificationsUsageDescription: "Convora sends daily reminders to help you stay on track with your communication lessons."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.convora.app
        INFOPLIST_KEY_CFBundleDisplayName: Convora
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_ENTITLEMENTS: Convora/Convora.entitlements
    entitlements:
      path: Convora/Convora.entitlements
    scheme:
      testTargets: []
      gatherCoverageData: false
