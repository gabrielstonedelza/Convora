name: Convora
options:
  bundleIdPrefix: com.convora
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

settings:
  base:
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
    INFOPLIST_KEY_UISupportedInterfaceOrientations~ipad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
    INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"

targets:
  Convora:
    type: application
    platform: iOS
    sources:
      - Convora
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.convora.app
        INFOPLIST_KEY_CFBundleDisplayName: Convora
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_NSUserNotificationsUsageDescription: "Convora sends daily reminders to help you stay on track with your communication lessons."
        CODE_SIGN_ENTITLEMENTS: Convora/Convora.entitlements
    entitlements:
      path: Convora/Convora.entitlements
    scheme:
      testTargets: []
      gatherCoverageData: false
